<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Águias da Vida - V1.1 Completo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* ARQUITETURA DE DESIGN ARCHÉ:
           - Foco: Cuidado Humano e Restauração (Arquétipo do Cuidador)
           - UX: Intercalação de Layout para manutenção de atenção
        */

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000;
            font-family: 'Lato', sans-serif;
            overflow: hidden; 
            color: #102a43;
        }

        /* TELA DE INTRODUÇÃO */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1a5b9c 0%, #0b2b4d 100%);
            z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 1; transition: opacity 1.5s ease-out, transform 1.5s ease-in-out;
        }
        #intro-screen.hide { opacity: 0; pointer-events: none; transform: scale(1.1); }
        
        .intro-logo { 
            width: 420px; 
            margin-bottom: 40px; 
            animation: float 5s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(139, 188, 224, 0.4));
        }

        .intro-title { 
            font-family: 'Montserrat', sans-serif; 
            color: #fff; 
            font-size: 5.5rem; 
            font-weight: 900; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            text-align: center;
            background: linear-gradient(90deg, #fff, #8bbce0, #fff);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        .intro-subtitle {
            font-family: 'Montserrat', sans-serif;
            color: #fff; 
            opacity: 0.85; 
            font-size: 1.6rem; 
            font-weight: 500;
            letter-spacing: 4px; 
            margin-top: 15px;
            text-transform: uppercase;
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* ESTRUTURA DOS SLIDES */
        .slide-container {
            width: 100vw; height: 100vh;
            display: flex;
            opacity: 0;
            position: absolute;
            top: 0; left: 0;
            transition: opacity 1.2s ease-in-out;
            background: #fff;
        }
        .slide-container.active { opacity: 1; z-index: 10; }

        .layout-even { flex-direction: row; }
        .layout-odd { flex-direction: row-reverse; }

        .hero-section {
            width: 60%; height: 100%;
            position: relative;
            background: #000;
            overflow: hidden;
        }
        .carousel-img {
            width: 100%; height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
            opacity: 0;
            will-change: opacity;
            transition: opacity 1.2s ease;
        }
        .carousel-img.active {
            opacity: 1;
            z-index: 2;
        }

        .content-section {
            width: 40%; height: 100%;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            z-index: 5;
            position: relative;
        }

        .theme-light { background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%); color: #102a43; }
        .theme-dark { background: linear-gradient(135deg, #164E87 0%, #0b2b4d 100%); color: #fff; }

        .tag-linha { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 700; font-size: 1.1rem; 
            letter-spacing: 3px; text-transform: uppercase; 
            margin-bottom: 15px;
            color: #6BA4D1;
        }
        .theme-dark .tag-linha { color: #8BBCE0; }

        h1 { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; font-size: 3.8rem; 
            line-height: 1; margin-bottom: 25px; 
            color: #164E87;
        }
        .theme-dark h1 { color: #fff; }

        .divider { width: 100px; height: 6px; background: #6BA4D1; border-radius: 3px; margin-bottom: 45px; }

        .beneficios-list { list-style: none; flex-grow: 1; }
        .beneficios-list li { 
            font-size: 1.4rem; font-weight: 400; margin-bottom: 24px; 
            display: flex; align-items: center; 
        }
        .beneficios-list li::before {
            content: '✔'; display: inline-flex; justify-content: center; align-items: center;
            width: 36px; height: 36px; background: #164E87; color: white; border-radius: 50%;
            font-size: 1.1rem; margin-right: 20px;
        }
        .theme-dark .beneficios-list li::before { background: #fff; color: #164E87; }

        /* CTA & FOOTER */
        .footer {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 25px; border-top: 1px solid rgba(139,188,224,0.2);
        }

        .cta-area { display: flex; flex-direction: column; }
        .cta-label { font-size: 0.9rem; margin-bottom: 5px; opacity: 0.8; font-weight: 700; }
        .cta-phone { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; font-size: 2rem; 
            color: #164E87; 
            background: rgba(22, 78, 135, 0.08);
            padding: 5px 15px; border-radius: 8px;
        }
        .theme-dark .cta-phone { color: #8BBCE0; background: rgba(255,255,255,0.1); }
        .theme-dark .cta-label { color: #fff; }

        .logo-small { width: 110px; object-fit: contain; }

        /* PROGRESS BAR */
        .progress-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: rgba(22, 78, 135, 0.1); z-index: 100; }
        .progress-bar-fill { height: 100%; width: 0%; background: #164E87; }
        .slide-container.active .progress-bar-fill { animation: progressAnim var(--tempo-troca-unidade, 30s) linear forwards; }
        @keyframes progressAnim { from { width: 0%; } to { width: 100%; } }

        /* TRANSIÇÃO DE CRUZ */
        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #164E87;
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.6s ease;
        }
        #transition-overlay.active { opacity: 1; pointer-events: all; }
        .transition-cross { width: 280px; opacity: 0; transform: scale(0.5) rotate(-90deg); transition: all 1s cubic-bezier(0.19, 1, 0.22, 1); }
        #transition-overlay.active .transition-cross { opacity: 1; transform: scale(1) rotate(0); }
        #transition-overlay.zoom .transition-cross { transform: scale(30) rotate(45deg); opacity: 0; transition: all 0.9s ease-in; }

    </style>
</head>
<body>

                beneficios: ["Área Verde Completa", "Recreação e Esportes", "Ambiente de Recuperação", "Equipe de Reabilitação"],
                imagens: [
                    "80 - Sorocaba - Fotos externa e areas de lazer/WhatsApp Image 2024-10-29 at 11.48.48 (2).webp",
                    "80 - Sorocaba - Fotos externa e areas de lazer/WhatsApp Image 2024-10-29 at 11.48.48.webp",

                    "80 - Sorocaba - Fotos externa e areas de lazer/WhatsApp Image 2024-10-29 at 11.48.53.webp",
                    "80 - Sorocaba - Fotos externa e areas de lazer/WhatsApp Image 2024-10-29 at 11.48.54 (1).webp"
                ]

        const TEMPO_FOTO = 3000;
        const TEMPO_UNIDADE = 30000;

        const root = document.getElementById('app-root');

        // Cria estrutura do slide SEM imagens (carrega sob demanda)
        function render() {
            unidades.forEach((uni, idx) => {
                const layout = idx % 2 === 0 ? 'layout-even' : 'layout-odd';
                const theme = idx % 2 === 0 ? 'theme-light' : 'theme-dark';
                const slide = document.createElement('div');
                slide.className = `slide-container ${layout} ${idx === 0 ? 'active' : ''}`;
                const bens = uni.beneficios.map(b => `<li>${b}</li>`).join('');
                slide.innerHTML = `
                    <div class="hero-section" id="hero-${idx}"></div>
                    <div class="content-section ${theme}">
                        <div class="progress-bar-container"><div class="progress-bar-fill"></div></div>
                        <div class="tag-linha">${uni.tag}</div>
                        <h1>UNIDADE ${uni.numero}<br>${uni.cidade}</h1>
                        <div class="divider"></div>
                        <ul class="beneficios-list">${bens}</ul>
                        <div class="footer">
                            <div class="cta-area">
                                <span class="cta-label">Precisa de ajuda agora?</span>
                                <span class="cta-phone">(11) 3564-1013</span>
                            </div>
                            <img src="logo-redondo.PNG" class="logo-small" loading="lazy">
                        </div>
                    </div>
                `;
                root.appendChild(slide);
            });
        }

        const loadedSlides = new Set();

        // Injeta imagens no hero de um slide (só quando necessário)
        function loadSlideImages(idx) {
            if (loadedSlides.has(idx)) return;
            loadedSlides.add(idx);
            const hero = document.getElementById(`hero-${idx}`);
            if (!hero) return;
            unidades[idx].imagens.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = `carousel-img${i === 0 ? ' active' : ''}`;
                if (i > 0) img.loading = 'lazy';
                hero.appendChild(img);
            });
        }

        let currentIdx = 0;
        let imgInterval;

        function startCarousel(idx) {
            clearInterval(imgInterval);
            const imgs = document.querySelectorAll(`#hero-${idx} .carousel-img`);
            let cur = 0;
            if (imgs.length < 2) return;
            imgInterval = setInterval(() => {
                imgs[cur].classList.remove('active');
                cur = (cur + 1) % imgs.length;
                imgs[cur].classList.add('active');
            }, TEMPO_FOTO);
        }

        function preloadNext(idx) {
            const nextIdx = (idx + 1) % unidades.length;
            loadSlideImages(nextIdx);
        }

        function transition() {
            const overlay = document.getElementById('transition-overlay');
            overlay.classList.add('active');
            setTimeout(() => {
                const slides = document.querySelectorAll('.slide-container');
                slides[currentIdx].classList.remove('active');
                currentIdx = (currentIdx + 1) % slides.length;
                slides[currentIdx].classList.add('active');
                startCarousel(currentIdx);
                preloadNext(currentIdx);
                overlay.classList.add('zoom');
                setTimeout(() => { overlay.classList.remove('active', 'zoom'); }, 900);
            }, 1200);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.documentElement.style.setProperty('--tempo-troca-unidade', `${TEMPO_UNIDADE / 1000}s`);
            render();
            // Carrega apenas o primeiro slide imediatamente
            loadSlideImages(0);
            setTimeout(() => {
                document.getElementById('intro-screen').classList.add('hide');
                setTimeout(() => {
                    startCarousel(0);
                    preloadNext(0);
                    setInterval(transition, TEMPO_UNIDADE);
                }, 1500);
            }, 3000);
        });
    </script>
</body>
</html>
